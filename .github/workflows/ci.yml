name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install black>=24.0 ruff>=0.4

      - name: black --check
        run: black --check src/ scripts/ tests/ app.py dagster_defs/

      - name: ruff check
        run: ruff check src/ scripts/ tests/ dagster_defs/ app.py

      - name: pytest
        env:
          SEC_EMBEDDER: hashing
          SEC_QDRANT_LOCATION: ":memory:"
          SEC_DUCKDB_PATH: ":memory:"
        run: pytest tests/ -v --tb=short

  dbt-build:
    name: dbt build (sample data)
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dbt + duckdb adapter
        run: pip install dbt-core>=1.8 dbt-duckdb>=1.8 duckdb>=0.10

      - name: Seed warehouse with sample data
        env:
          SEC_DUCKDB_PATH: ${{ github.workspace }}/ci_warehouse.duckdb
        run: python scripts/seed_ci_warehouse.py

      - name: dbt build
        env:
          SEC_DUCKDB_PATH: ${{ github.workspace }}/ci_warehouse.duckdb
        working-directory: dbt
        run: dbt build --profiles-dir . --project-dir .
