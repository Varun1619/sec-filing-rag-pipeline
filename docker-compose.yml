# Optional: run a Qdrant server instead of the embedded client.
# Set SEC_QDRANT_LOCATION=http://localhost:6333 in your .env to use it.
# The application code is identical regardless of which mode is used.
#
# Usage:
#   docker compose up -d qdrant
#   # then set SEC_QDRANT_LOCATION=http://localhost:6333
version: "3.9"
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
